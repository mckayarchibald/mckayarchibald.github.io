<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Page</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Datatype:wght@700&display=swap" rel="stylesheet">    <style> * { overflow-x: hidden; } </style>
    <style>
        body {
            font-family: 'Datatype', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            height: 100vh;
            background-color: #faf5eb;
        }
        
        .left-column {
            flex: 1;
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            /* font-weight: 900; */
            /* font-family: 'PT Serif', serif; */
        }
        .right-column {
                        font-family: 'Datatype', sans-serif;
            flex: 1;
            padding: 0 0 0 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: stretch;
            position: relative; /* allow absolute positioning inside */
        }
        .header-text {
            font-size: 2.5em;
            /* margin-bottom: 20px; */
            padding: 30px 0 0 20px;
        }
        .profile-picture {
            width: 400px;
            height: 400px;
            object-fit: cover;
            /* filter: grayscale(100%); */
            margin-bottom: 15px;
            clip-path: circle();
        }
        .bottom-menu {
            display: flex;
            flex-direction: row;
            justify-content: flex-start;
            align-items: center;
            gap: 20px;
            width: 100%;
        }
        .menu-option {
            margin: 5px 0;
            cursor: pointer;
            font-size: 1.2em;
        }
        .menu-item {
            width: 100%;
            flex: 1;
            margin: 0;
            display: flex;
            justify-content: flex-start;
            align-items: center;
            padding-left: 30px;
            color: white;
            cursor: pointer;
            font-size: 1.2em;
        }
        
        .menu-item:nth-child(1) { background-color:#235789; }
        .menu-item:nth-child(2) { background-color: #C1292E; }
        .menu-item:nth-child(3) { background-color: #161925; }
        .menu-item:nth-child(4) { background-color: #F1D302; }
        .menu-item:nth-child(5) { background-color: #80B192; }
        
        /* hover effect for menu items */
        .menu-item {
            position: relative;
        }
        .menu-item span {
            transition: transform 0.2s ease;
        }
        .menu-item:hover span {
            transform: translateX(10px);
        }
        .menu-item::before {
            content: '';
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%) rotate(45deg);
            width: 8px;
            height: 8px;
            background-color: white;
            opacity: 0;
            transition: opacity 0.2s ease;
        }
        .menu-item:hover::before {
            opacity: 1;
        }
        
        /* page styles */
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 40px;
            padding-left: 20px;
            padding-right: 35px;
            padding-bottom: 20px;
        }

        .page-title {
            color: #fff;
            font-size: 1.9em;
            margin: 0;
            padding-left: 10px;
        }
        .back-button {
            background: none;
            border: none;
            padding: 0 10px 0 0;
            font-size: 2.5em;
            color: #fff;
            text-decoration: none;
            cursor: pointer;
        }
        .page-list {
            list-style: none;
            padding-left: 30px;
        }
        .page-list li {
            margin: 10px 0;
            font-size: 1.6em;
            color: #fff;
        }
    </style>
    <style>
        @media (max-width: 768px) {
            body {
                flex-direction: column;
            }
            .left-column, .right-column {
                flex: none;
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="left-column">
        <div class="header-text">McKay Archibald writes code and designs software in Salt Lake City</div>
        <img class="profile-picture" src="profile.jpg" alt="Profile Picture">
        <div class="bottom-menu">
            <div class="menu-option" onclick="window.location.href='mailto:hey@mckayarchibald.com'">Email</div>
            <div class="menu-option" onclick="window.open('https://github.com/mckayarchibald')">Github</div>
            <div class="menu-option" onclick="window.open('https://bsky.app/profile/mckayarchibald.bsky.social')">Bluesky</div>
        </div>
    </div>
    <div class="right-column" id="right-column">
        <div class="menu-item" onclick="showPage('Portfolio','#235789', ['Portfolio A','Portfolio B','Portfolio C'])"><span><b>Portfolio</b></span></div>
        <div class="menu-item" onclick="showPage('Design','#C1292E', ['Design A','Design B','Design C'])"><span>Design</span></div>
        <div class="menu-item" onclick="showPage('Code','#161925', ['Code A','Code B','Code C'])"><span>Code</span></div>
        <div class="menu-item" onclick="showPage('About','#F1D302', ['About A','About B','About C'])"><span>About</span></div>
        <div class="menu-item" onclick="window.open('https://mckayarchibald.hashnode.dev/')"><span>Journal</span></div>
    </div>
    <script>
        const originalMenu = `
        <div class="menu-item" onclick="showPage('Portfolio','#235789', ['Portfolio A','Portfolio B','Portfolio C'])"><span><b>Portfolio</b></span></div>
        <div class="menu-item" onclick="showPage('Design','#C1292E', ['Design A','Design B','Design C'])"><span>Design</span></div>
        <div class="menu-item" onclick="showPage('Code','#161925', ['Code A','Code B','Code C'])"><span>Code</span></div>
        <div class="menu-item" onclick="showPage('About','#F1D302', ['About A','About B','About C'])"><span>About</span></div>
        <div class="menu-item" onclick="window.open('https://mckayarchibald.hashnode.dev/')"><span>Journal</span></div>
        `;

        function showMenu() {
            const right = document.getElementById('right-column');
            right.style.backgroundColor = '';
            right.style.justifyContent = 'center';
            right.innerHTML = originalMenu;
        }

        function showPage(title, color, items) {
            const right = document.getElementById('right-column');
            right.style.backgroundColor = color;
            right.style.justifyContent = 'flex-start';
            let html = '<div class="page-header"><h1 class="page-title">' + title + '</h1><button onclick="showMenu()" class="back-button">☞</button></div>';
            html += '<ul class="page-list">';
            items.forEach(item => {
                html += `<li>${item}</li>`;
            });
            html += '</ul>';
            right.innerHTML = html;
        }
    </script>
</body>
</html>
